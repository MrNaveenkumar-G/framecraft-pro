<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Products - FrameCraft Pro</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .image-upload-area {
      border: 2px dashed var(--border);
      border-radius: 12px;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      cursor: pointer;
      transition: var(--transition);
      background: var(--bg2);
      overflow: hidden;
      position: relative;
    }
    .image-upload-area:hover { border-color: var(--primary); background: rgba(200,134,10,0.04); }
    #imageUploadPlaceholder { display:flex; flex-direction:column; align-items:center; text-align:center; padding:20px; pointer-events:none; }
    .prod-img-box { height:180px; display:flex; align-items:center; justify-content:center; overflow:hidden; background:var(--bg2); }
    .prod-img-box img { width:100%; height:100%; object-fit:cover; }
    .prod-img-box .placeholder-icon { display:flex; flex-direction:column; align-items:center; justify-content:center; width:100%; height:100%; font-size:2.5rem; color:rgba(255,255,255,0.85); }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg fixed-top" id="mainNav">
  <div class="container-fluid px-4">
    <a class="navbar-brand" href="index.html"><span class="brand-icon"><i class="fas fa-border-all"></i></span><span class="brand-text">Frame<strong>Craft</strong></span></a>
    <div class="d-flex align-items-center gap-3 ms-auto">
      <button class="btn btn-theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon" id="themeIcon"></i></button>
      <div class="nav-profile" onclick="window.location='settings.html'"><img src="" id="navAvatar" class="nav-avatar" alt=""/><span id="navUserName">User</span></div>
    </div>
  </div>
</nav>

<div class="dashboard-layout">
  <aside class="sidebar">
    <div class="sidebar-section-label">Main</div>
    <ul class="sidebar-menu">
      <li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
      <li><a href="invoice.html"><i class="fas fa-file-invoice"></i> New Invoice</a></li>
      <li><a href="invoice-history.html"><i class="fas fa-history"></i> Invoice History</a></li>
      <li><a href="customers.html"><i class="fas fa-users"></i> Customers</a></li>
      <li><a href="products.html" class="active"><i class="fas fa-th-large"></i> Products</a></li>
    </ul>
    <div class="sidebar-section-label">Tools</div>
    <ul class="sidebar-menu">
      <li><a href="reminders.html"><i class="fas fa-bell"></i> Reminders</a></li>
      <li><a href="settings.html"><i class="fas fa-cog"></i> Settings</a></li>
    </ul>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <div class="d-flex align-items-center">
        <div class="page-header-icon"><i class="fas fa-th-large"></i></div>
        <div><h2>Products</h2><p>Your frame catalog & inventory</p></div>
      </div>
      <button class="btn btn-primary-custom" onclick="openAddProduct()"><i class="fas fa-plus me-2"></i>Add Product</button>
    </div>

    <div class="chart-card mb-4">
      <div class="row g-3 align-items-center">
        <div class="col-md-5">
          <div class="search-bar"><i class="fas fa-search"></i>
            <input type="text" class="form-control" id="searchProd" placeholder="Search products..." oninput="renderProducts()"/>
          </div>
        </div>
        <div class="col-md-7">
          <div class="d-flex gap-2 flex-wrap">
            <button class="filter-chip active" onclick="setCat('all',this)">All</button>
            <button class="filter-chip" onclick="setCat('wood',this)">Wood</button>
            <button class="filter-chip" onclick="setCat('metal',this)">Metal</button>
            <button class="filter-chip" onclick="setCat('premium',this)">Premium</button>
            <button class="filter-chip" onclick="setCat('kids',this)">Kids</button>
            <button class="filter-chip" onclick="setCat('glass',this)">Glass</button>
            <button class="filter-chip" onclick="setCat('collage',this)">Collage</button>
          </div>
        </div>
      </div>
    </div>

    <div class="row g-3" id="productsGrid"></div>
  </main>
</div>

<!-- Add/Edit Product Modal -->
<div class="modal fade" id="addProductModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content" style="background:var(--card-bg);border:1px solid var(--border)">
      <div class="modal-header" style="border-bottom:1px solid var(--border)">
        <h5 class="modal-title" style="font-weight:700" id="prodModalTitle">Add Product</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editProdId"/>
        <div class="row g-3">

          <!-- Image Upload -->
          <div class="col-12">
            <label class="form-label"><i class="fas fa-image me-1" style="color:var(--primary)"></i>Product Image</label>
            <div class="image-upload-area" id="imageUploadArea" onclick="document.getElementById('prodImageInput').click()">
              <img id="imagePreview" src="" alt="" style="display:none;width:100%;height:100%;object-fit:cover;border-radius:10px;position:absolute;inset:0"/>
              <div id="imageUploadPlaceholder">
                <i class="fas fa-cloud-upload-alt fa-2x mb-2" style="color:var(--primary)"></i>
                <div style="font-weight:600;color:var(--text)">Click to upload product image</div>
                <div style="font-size:0.8rem;color:var(--text-muted);margin-top:4px">JPG, PNG, WEBP — max 2MB</div>
              </div>
            </div>
            <input type="file" id="prodImageInput" accept="image/*" style="display:none" onchange="handleProductImageUpload(this)"/>
            <button class="btn btn-sm mt-2" id="clearImgBtn" style="display:none;color:#EF4444;font-size:0.8rem;background:rgba(239,68,68,0.08);border-radius:6px;padding:4px 12px;border:1px solid rgba(239,68,68,0.2)" onclick="clearProductImage()">
              <i class="fas fa-times me-1"></i>Remove Image
            </button>
          </div>

          <!-- Name & Category -->
          <div class="col-md-8">
            <label class="form-label">Product Name *</label>
            <input type="text" id="prodName" class="form-control" placeholder="e.g. Classic Wood Frame"/>
          </div>
          <div class="col-md-4">
            <label class="form-label">Category</label>
            <select class="form-select" id="prodCategory">
              <option value="wood">Wood</option>
              <option value="metal">Metal</option>
              <option value="premium">Premium</option>
              <option value="kids">Kids</option>
              <option value="glass">Glass</option>
              <option value="collage">Collage</option>
            </select>
          </div>

          <!-- Size Dropdown -->
          <div class="col-md-5">
            <label class="form-label">Frame Size</label>
            <select class="form-select" id="prodSizeSelect" onchange="handleSizeSelect(this.value)">
              <option value="">-- Select Size --</option>
              <optgroup label="Standard Photo Sizes">
                <option value="4x6 inch">4x6 inch</option>
                <option value="5x7 inch">5x7 inch</option>
                <option value="6x8 inch">6x8 inch</option>
                <option value="8x10 inch">8x10 inch</option>
                <option value="8x11 inch">8x11 inch</option>
                <option value="8x12 inch">8x12 inch</option>
                <option value="10x12 inch">10x12 inch</option>
                <option value="10x15 inch">10x15 inch</option>
                <option value="12x15 inch">12x15 inch</option>
                <option value="12x18 inch">12x18 inch</option>
                <option value="16x20 inch">16x20 inch</option>
                <option value="18x24 inch">18x24 inch</option>
                <option value="24x36 inch">24x36 inch</option>
              </optgroup>
              <optgroup label="Square Sizes">
                <option value="4x4 inch">4x4 inch</option>
                <option value="5x5 inch">5x5 inch</option>
                <option value="6x6 inch">6x6 inch</option>
                <option value="8x8 inch">8x8 inch</option>
                <option value="10x10 inch">10x10 inch</option>
                <option value="12x12 inch">12x12 inch</option>
              </optgroup>
              <optgroup label="Paper Sizes">
                <option value="A4">A4 (8.3x11.7 inch)</option>
                <option value="A3">A3 (11.7x16.5 inch)</option>
                <option value="A2">A2 (16.5x23.4 inch)</option>
              </optgroup>
              <option value="custom">✏️ Custom Size</option>
            </select>
          </div>
          <div class="col-md-3" id="customSizeDiv" style="display:none">
            <label class="form-label">Custom Size</label>
            <input type="text" id="prodCustomSize" class="form-control" placeholder="13x19 inch"/>
          </div>

          <!-- Price, Stock, Unit -->
          <div class="col-md-4">
            <label class="form-label">Price (₹) *</label>
            <input type="number" id="prodPrice" class="form-control" placeholder="150" min="0"/>
          </div>
          <div class="col-md-4">
            <label class="form-label">Stock Qty</label>
            <input type="number" id="prodStock" class="form-control" placeholder="50" min="0"/>
          </div>
          <div class="col-md-4">
            <label class="form-label">Unit</label>
            <select class="form-select" id="prodUnit">
              <option value="Pcs">Pcs</option>
              <option value="Nos">Nos</option>
              <option value="Set">Set</option>
              <option value="Box">Box</option>
            </select>
          </div>

          <div class="col-12">
            <label class="form-label">Description (optional)</label>
            <textarea id="prodDesc" class="form-control" rows="2" placeholder="Premium wood frame with glass cover..."></textarea>
          </div>
        </div>
      </div>
      <div class="modal-footer" style="border-top:1px solid var(--border)">
        <button class="btn btn-outline-custom" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary-custom" onclick="saveProductForm()"><i class="fas fa-save me-2"></i>Save Product</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>
let currentCat = 'all';
let currentProductImage = '';

const GRADIENTS = [
  'linear-gradient(135deg,#8B5E3C,#D4A05A)',
  'linear-gradient(135deg,#4B5563,#9CA3AF)',
  'linear-gradient(135deg,#C8860A,#F59E0B)',
  'linear-gradient(135deg,#DB2777,#F9A8D4)',
  'linear-gradient(135deg,#2563EB,#60A5FA)',
  'linear-gradient(135deg,#059669,#34D399)',
  'linear-gradient(135deg,#0891B2,#67E8F9)',
  'linear-gradient(135deg,#92400E,#D97706)'
];

document.addEventListener('DOMContentLoaded', renderProducts);

function setCat(cat, el) {
  currentCat = cat;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderProducts();
}

function renderProducts() {
  const search = (document.getElementById('searchProd')?.value || '').toLowerCase();
  let products = getProducts();
  if (currentCat !== 'all') products = products.filter(p => p.category === currentCat);
  if (search) products = products.filter(p =>
    p.name.toLowerCase().includes(search) ||
    (p.size||'').toLowerCase().includes(search) ||
    (p.category||'').toLowerCase().includes(search)
  );

  const grid = document.getElementById('productsGrid');
  if (!grid) return;
  if (products.length === 0) {
    grid.innerHTML = `<div class="col-12"><div class="empty-state"><i class="fas fa-th-large"></i><h4>No products found</h4></div></div>`;
    return;
  }

  grid.innerHTML = products.map((p, idx) => {
    const pct = Math.min(Math.round(((p.stock||0)/50)*100), 100);
    const stockColor = pct > 60 ? '#10B981' : pct > 30 ? '#F59E0B' : '#EF4444';
    const imgHtml = p.image
      ? `<div class="prod-img-box"><img src="${p.image}" alt="${p.name}"/></div>`
      : `<div class="prod-img-box" style="background:${GRADIENTS[idx % GRADIENTS.length]}"><div class="placeholder-icon"><i class="fas fa-border-all"></i></div></div>`;

    return `
    <div class="col-sm-6 col-md-4 col-lg-3">
      <div class="product-card">
        ${imgHtml}
        <div class="product-body">
          <div class="product-name">${p.name}</div>
          <div class="product-size">${p.size||'—'} · <span style="text-transform:capitalize">${p.category}</span></div>
          <div class="d-flex align-items-center justify-content-between mt-2">
            <div class="product-price">${formatCurrency(p.price)}</div>
            <span style="font-size:0.75rem;color:${stockColor};font-weight:600">${p.stock||0} ${p.unit||'Pcs'}</span>
          </div>
          <div class="stock-bar mt-2"><div class="stock-fill" style="width:${pct}%;background:${stockColor}"></div></div>
          <div class="product-actions">
            <button class="btn-add-invoice" onclick="window.location='invoice.html?product=${p.id}'">
              <i class="fas fa-file-invoice me-1"></i>Invoice
            </button>
            <button class="btn btn-sm" style="background:rgba(59,130,246,0.1);color:#3B82F6;border-radius:6px;padding:4px 8px" onclick="editProduct(${p.id})"><i class="fas fa-edit"></i></button>
            <button class="btn btn-sm" style="background:rgba(239,68,68,0.1);color:#EF4444;border-radius:6px;padding:4px 8px" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i></button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function handleSizeSelect(val) {
  const div = document.getElementById('customSizeDiv');
  if (div) div.style.display = val === 'custom' ? 'block' : 'none';
}

function handleProductImageUpload(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) { showToast('Image must be under 2MB', 'error'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    currentProductImage = e.target.result;
    const preview = document.getElementById('imagePreview');
    const ph = document.getElementById('imageUploadPlaceholder');
    const btn = document.getElementById('clearImgBtn');
    preview.src = currentProductImage; preview.style.display = 'block';
    ph.style.display = 'none'; btn.style.display = 'inline-block';
  };
  reader.readAsDataURL(file);
}

function clearProductImage() {
  currentProductImage = '';
  document.getElementById('imagePreview').src = '';
  document.getElementById('imagePreview').style.display = 'none';
  document.getElementById('imageUploadPlaceholder').style.display = 'flex';
  document.getElementById('clearImgBtn').style.display = 'none';
  document.getElementById('prodImageInput').value = '';
}

function openAddProduct() {
  document.getElementById('prodModalTitle').textContent = 'Add Product';
  document.getElementById('editProdId').value = '';
  ['prodName','prodPrice','prodStock','prodDesc','prodCustomSize'].forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
  document.getElementById('prodCategory').value = 'wood';
  document.getElementById('prodSizeSelect').value = '';
  document.getElementById('prodUnit').value = 'Pcs';
  document.getElementById('customSizeDiv').style.display = 'none';
  clearProductImage();
  new bootstrap.Modal(document.getElementById('addProductModal')).show();
}

function editProduct(id) {
  const p = getProducts().find(p => p.id === id);
  if (!p) return;
  document.getElementById('prodModalTitle').textContent = 'Edit Product';
  document.getElementById('editProdId').value = id;
  document.getElementById('prodName').value = p.name || '';
  document.getElementById('prodPrice').value = p.price || '';
  document.getElementById('prodStock').value = p.stock || '';
  document.getElementById('prodDesc').value = p.desc || '';
  document.getElementById('prodCategory').value = p.category || 'wood';
  document.getElementById('prodUnit').value = p.unit || 'Pcs';

  // Size logic
  const sizeSelect = document.getElementById('prodSizeSelect');
  const options = Array.from(sizeSelect.options).map(o => o.value);
  if (p.size && options.includes(p.size)) {
    sizeSelect.value = p.size;
    document.getElementById('customSizeDiv').style.display = 'none';
  } else if (p.size) {
    sizeSelect.value = 'custom';
    document.getElementById('customSizeDiv').style.display = 'block';
    document.getElementById('prodCustomSize').value = p.size;
  } else {
    sizeSelect.value = '';
    document.getElementById('customSizeDiv').style.display = 'none';
  }

  // Image
  currentProductImage = p.image || '';
  if (p.image) {
    document.getElementById('imagePreview').src = p.image;
    document.getElementById('imagePreview').style.display = 'block';
    document.getElementById('imageUploadPlaceholder').style.display = 'none';
    document.getElementById('clearImgBtn').style.display = 'inline-block';
  } else {
    clearProductImage();
  }
  document.getElementById('prodImageInput').value = '';
  new bootstrap.Modal(document.getElementById('addProductModal')).show();
}

function saveProductForm() {
  const name = document.getElementById('prodName')?.value?.trim();
  const price = parseFloat(document.getElementById('prodPrice')?.value || 0);
  if (!name) { showToast('Product name is required', 'error'); return; }
  if (!price) { showToast('Price is required', 'error'); return; }

  const sizeVal = document.getElementById('prodSizeSelect')?.value;
  const size = sizeVal === 'custom'
    ? (document.getElementById('prodCustomSize')?.value?.trim() || '')
    : sizeVal;

  const products = getProducts();
  const editId = parseInt(document.getElementById('editProdId')?.value);

  const prod = {
    name, price, size,
    category: document.getElementById('prodCategory')?.value || 'wood',
    unit: document.getElementById('prodUnit')?.value || 'Pcs',
    stock: parseInt(document.getElementById('prodStock')?.value || 0),
    desc: document.getElementById('prodDesc')?.value || '',
    image: currentProductImage || '',
    icon: 'fas fa-border-all',
    gradient: 'linear-gradient(135deg,#C8860A,#E8A020)'
  };

  if (editId) {
    const idx = products.findIndex(p => p.id === editId);
    if (idx >= 0) { prod.id = editId; products[idx] = prod; }
  } else {
    prod.id = products.length > 0 ? Math.max(...products.map(p => p.id)) + 1 : 1;
    products.push(prod);
  }

  saveProducts(products);
  bootstrap.Modal.getInstance(document.getElementById('addProductModal')).hide();
  showToast(editId ? 'Product updated!' : 'Product added!', 'success');
  renderProducts();
}

function deleteProduct(id) {
  if (!confirm('Delete this product?')) return;
  saveProducts(getProducts().filter(p => p.id !== id));
  showToast('Product deleted', 'info');
  renderProducts();
}

window.setCat=setCat; window.renderProducts=renderProducts;
window.openAddProduct=openAddProduct; window.editProduct=editProduct;
window.saveProductForm=saveProductForm; window.deleteProduct=deleteProduct;
window.handleSizeSelect=handleSizeSelect;
window.handleProductImageUpload=handleProductImageUpload;
window.clearProductImage=clearProductImage;
</script>
</body>
</html>
