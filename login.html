<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - FrameCraft Pro</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      position: relative;
      overflow: hidden;
      padding: 20px;
    }
    .login-bg-shape {
      position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.12;
    }
    .login-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: var(--shadow-lg);
      position: relative;
      z-index: 1;
    }
    .login-logo {
      display: flex; align-items: center; gap: 12px;
      justify-content: center; margin-bottom: 32px;
    }
    .login-logo .brand-icon {
      width: 48px; height: 48px; font-size: 1.3rem;
    }
    .login-logo .brand-text { font-size: 1.8rem; }
    .login-title {
      font-family: var(--font-display);
      font-size: 1.6rem; font-weight: 700;
      color: var(--text); text-align: center; margin-bottom: 6px;
    }
    .login-sub {
      text-align: center; color: var(--text-muted);
      font-size: 0.9rem; margin-bottom: 32px;
    }
    .role-tabs {
      display: flex; gap: 8px;
      background: var(--bg2);
      border-radius: 12px; padding: 4px;
      margin-bottom: 28px;
    }
    .role-tab {
      flex: 1; text-align: center;
      padding: 10px 8px; border-radius: 8px;
      cursor: pointer; font-size: 0.85rem;
      font-weight: 600; color: var(--text-muted);
      transition: var(--transition); border: none;
      background: transparent;
    }
    .role-tab.active {
      background: var(--card-bg);
      color: var(--primary);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .role-tab i { display: block; font-size: 1.1rem; margin-bottom: 4px; }
    .input-icon-wrap { position: relative; }
    .input-icon-wrap i {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted); font-size: 0.9rem;
    }
    .input-icon-wrap .form-control { padding-left: 40px; }
    .input-icon-wrap .toggle-pass {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%);
      cursor: pointer; color: var(--text-muted);
      background: none; border: none; padding: 0;
    }
    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white; border: none;
      border-radius: 12px; padding: 14px;
      font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: var(--transition);
      box-shadow: 0 4px 20px rgba(200,134,10,0.35);
      margin-top: 8px;
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(200,134,10,0.45); }
    .demo-hint {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-top: 20px;
      font-size: 0.82rem;
      color: var(--text-muted);
    }
    .demo-hint strong { color: var(--text); }
    .demo-cred {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 10px; background: var(--card-bg);
      border-radius: 6px; margin-top: 6px; cursor: pointer;
      border: 1px solid var(--border); transition: var(--transition);
    }
    .demo-cred:hover { border-color: var(--primary); }
    .demo-cred code { font-size: 0.8rem; color: var(--primary); }
    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #EF4444; border-radius: 8px;
      padding: 10px 14px; font-size: 0.85rem;
      margin-bottom: 16px; display: none;
    }
    .theme-toggle-login {
      position: fixed; top: 16px; right: 16px;
      width: 38px; height: 38px; border-radius: 50%;
      border: 1px solid var(--border); background: var(--card-bg);
      color: var(--text); display: flex;
      align-items: center; justify-content: center;
      cursor: pointer; z-index: 10;
    }
  </style>
</head>
<body>

<div class="login-page">
  <!-- BG Shapes -->
  <div class="login-bg-shape" style="width:500px;height:500px;background:var(--primary);top:-150px;right:-100px"></div>
  <div class="login-bg-shape" style="width:350px;height:350px;background:#2563EB;bottom:-100px;left:-80px"></div>

  <!-- Theme Toggle -->
  <button class="theme-toggle-login" onclick="toggleTheme()">
    <i class="fas fa-moon" id="themeIcon"></i>
  </button>

  <div class="login-card">
    <!-- Logo -->
    <div class="login-logo">
      <span class="brand-icon"><i class="fas fa-border-all"></i></span>
      <span class="brand-text" id="loginBizName">Frame<strong>Craft</strong></span>
    </div>

    <h2 class="login-title">Welcome Back!</h2>
    <p class="login-sub">Sign in to continue to your account</p>

    <!-- Role Tabs -->
    <div class="role-tabs">
      <button class="role-tab active" id="tabAdmin" onclick="switchRole('admin')">
        <i class="fas fa-user-shield"></i> Admin
      </button>
      <button class="role-tab" id="tabStaff" onclick="switchRole('staff')">
        <i class="fas fa-user-tie"></i> Staff
      </button>
      <button class="role-tab" id="tabCustomer" onclick="switchRole('customer')">
        <i class="fas fa-user"></i> Customer
      </button>
    </div>

    <!-- Error -->
    <div class="error-msg" id="errorMsg">
      <i class="fas fa-exclamation-circle me-2"></i><span id="errorText">Invalid credentials</span>
    </div>

    <!-- Login Form -->
    <div class="mb-3">
      <label class="form-label">Username / Email</label>
      <div class="input-icon-wrap">
        <i class="fas fa-user"></i>
        <input type="text" id="loginUser" class="form-control" placeholder="Enter username or email"
          onkeydown="if(event.key==='Enter')doLogin()"/>
      </div>
    </div>

    <div class="mb-3" id="passwordField">
      <label class="form-label">Password</label>
      <div class="input-icon-wrap">
        <i class="fas fa-lock"></i>
        <input type="password" id="loginPass" class="form-control" placeholder="Enter password"
          onkeydown="if(event.key==='Enter')doLogin()"/>
        <button class="toggle-pass" onclick="togglePass()">
          <i class="fas fa-eye" id="passEyeIcon"></i>
        </button>
      </div>
    </div>

    <!-- Customer phone field -->
    <div class="mb-3" id="phoneField" style="display:none">
      <label class="form-label">Phone Number</label>
      <div class="input-icon-wrap">
        <i class="fas fa-phone"></i>
        <input type="tel" id="loginPhone" class="form-control" placeholder="+91 98765 43210"
          onkeydown="if(event.key==='Enter')doLogin()"/>
      </div>
      <div style="font-size:0.78rem;color:var(--text-muted);margin-top:4px">
        <i class="fas fa-info-circle me-1"></i>Enter your registered phone number to browse products
      </div>
    </div>

    <button class="btn-login" onclick="doLogin()" id="loginBtn">
      <i class="fas fa-sign-in-alt me-2"></i>Sign In
    </button>

    <!-- Demo Credentials -->
    <div class="demo-hint">
      <strong><i class="fas fa-key me-1"></i> Demo Credentials (click to fill)</strong>
      <div class="demo-cred" onclick="fillCred('admin','admin123')">
        <span>👑 Admin</span><code>admin / admin123</code>
      </div>
      <div class="demo-cred" onclick="fillCred('staff','staff123')">
        <span>👤 Staff</span><code>staff / staff123</code>
      </div>
      <div class="demo-cred" onclick="fillCredPhone('9876543210')">
        <span>🛍️ Customer</span><code>Phone: 9876543210</code>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script>
let currentRole = 'admin';

document.addEventListener('DOMContentLoaded', () => {
  // Already logged in? redirect
  const session = getSession();
  if (session) {
    redirectByRole(session.role);
    return;
  }
  const s = getSettings();
  const bizEl = document.getElementById('loginBizName');
  if (bizEl && s.businessName) {
    bizEl.innerHTML = `<strong>${s.businessName}</strong>`;
  }
});

function switchRole(role) {
  currentRole = role;
  ['admin','staff','customer'].forEach(r => {
    document.getElementById('tab' + r.charAt(0).toUpperCase() + r.slice(1)).classList.toggle('active', r === role);
  });
  document.getElementById('passwordField').style.display = role === 'customer' ? 'none' : 'block';
  document.getElementById('phoneField').style.display = role === 'customer' ? 'block' : 'none';
  document.getElementById('loginUser').style.display = role === 'customer' ? 'none' : 'block';
  document.querySelector('label[for="loginUser"]')?.previousElementSibling;
  document.getElementById('errorMsg').style.display = 'none';
}

function togglePass() {
  const inp = document.getElementById('loginPass');
  const icon = document.getElementById('passEyeIcon');
  if (inp.type === 'password') { inp.type = 'text'; icon.className = 'fas fa-eye-slash'; }
  else { inp.type = 'password'; icon.className = 'fas fa-eye'; }
}

function fillCred(user, pass) {
  switchRole(user === 'admin' ? 'admin' : 'staff');
  document.getElementById('loginUser').value = user;
  document.getElementById('loginPass').value = pass;
}

function fillCredPhone(phone) {
  switchRole('customer');
  document.getElementById('loginPhone').value = phone;
}

function doLogin() {
  const btn = document.getElementById('loginBtn');
  btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Signing in...';
  btn.disabled = true;

  setTimeout(() => {
    const result = attemptLogin(currentRole);
    if (result.success) {
      btn.innerHTML = '<i class="fas fa-check me-2"></i>Success!';
      setTimeout(() => redirectByRole(currentRole), 600);
    } else {
      showError(result.message);
      btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Sign In';
      btn.disabled = false;
    }
  }, 500);
}

function attemptLogin(role) {
  const users = getUsers();

  if (role === 'customer') {
    const phone = document.getElementById('loginPhone')?.value?.trim().replace(/\D/g,'');
    if (!phone) return { success: false, message: 'Please enter your phone number' };
    const customer = getCustomers().find(c => c.phone?.replace(/\D/g,'') === phone);
    if (!customer) return { success: false, message: 'Phone number not registered. Contact admin.' };
    setSession({ role: 'customer', name: customer.name, phone: customer.phone, customerId: customer.id });
    return { success: true };
  }

  const username = document.getElementById('loginUser')?.value?.trim();
  const password = document.getElementById('loginPass')?.value;
  if (!username || !password) return { success: false, message: 'Please enter username and password' };

  const user = users.find(u => u.username === username && u.password === password && u.role === role && u.active);
  if (!user) return { success: false, message: 'Invalid username or password' };

  setSession({ role: user.role, name: user.name, username: user.username, userId: user.id });
  return { success: true };
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  document.getElementById('errorText').textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

function redirectByRole(role) {
  if (role === 'customer') window.location.href = 'customer-shop.html';
  else window.location.href = 'dashboard.html';
}

window.switchRole = switchRole;
window.togglePass = togglePass;
window.fillCred = fillCred;
window.fillCredPhone = fillCredPhone;
window.doLogin = doLogin;
</script>
</body>
</html>
